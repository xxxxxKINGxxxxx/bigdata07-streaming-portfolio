networks:
  aqi-network:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aqi-zookeeper
    networks:
      - aqi-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aqi-kafka
    networks:
      - aqi-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: aqi-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://aqi-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aqi-redis
    networks:
      - aqi-network
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    image: apache/spark:3.5.0
    container_name: aqi-spark-master
    networks:
      - aqi-network
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:3.5.0
    container_name: aqi-spark-worker
    networks:
      - aqi-network
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://aqi-spark-master:7077
    ports:
      - "8081:8081"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://aqi-spark-master:7077

  producer:
    build:
      context: ../producer
      dockerfile: Dockerfile
    container_name: aqi-producer
    networks:
      - aqi-network
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../data:/data
    environment:
      - KAFKA_BROKER=aqi-kafka:29092
      - KAFKA_TOPIC=aqi-stream
      - PUBLISH_DELAY=0.1
      - CSV_PATH=/data/US_AQI.csv
    restart: on-failure

  spark-streaming:
    build:
      context: ../spark
      dockerfile: Dockerfile
    container_name: aqi-spark-streaming
    networks:
      - aqi-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=aqi-kafka:29092
      - KAFKA_TOPIC=aqi-stream
      - REDIS_HOST=aqi-redis
      - REDIS_PORT=6379
      - WINDOW_DURATION=30 seconds
      - WATERMARK_DELAY=10 seconds
      - CHECKPOINT_DIR=/tmp/checkpoint
    volumes:
      - spark-checkpoint:/tmp/checkpoint

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: aqi-dashboard
    networks:
      - aqi-network
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=aqi-redis
      - REDIS_PORT=6379
      - REFRESH_INTERVAL=5
    restart: on-failure

volumes:
  spark-checkpoint:
